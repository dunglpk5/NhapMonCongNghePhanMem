# ═══════════════════════════════════════════════════════════
#  Test Profile — sử dụng H2 in-memory thay vì SQL Server
# ═══════════════════════════════════════════════════════════

# ── H2 IN-MEMORY DATABASE ──────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / HIBERNATE ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.sql.init.mode=never

# ── JWT (giá trị giả cho test) ──────────────────────────────
app.jwt.secret=test-secret-key-for-junit-testing-only-32chars
app.jwt.expiration-ms=3600000

# ── SECURITY ────────────────────────────────────────────────
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=15
app.cors.allowed-origins=http://localhost
