spring.application.name=nmcnpm
# ═══════════════════════════════════════════════════════════
#  GtuSchool — application.properties
# ═══════════════════════════════════════════════════════════

# ── SERVER ──────────────────────────────────────────────────
server.port=8080

# ── SQL SERVER ──────────────────────────────────────────────
# ── SQL SERVER ──────────────────────────────────────────────
# CÁCH 1: Dùng SQL Server Authentication (Tên đăng nhập và Mật khẩu) - Đã sửa để fix lỗi của bạn
spring.datasource.url=jdbc:sqlserver://DESKTOP-7PEUK5P;databaseName=SchoolManagementSystem;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456

# CÁCH 2: Dùng Windows Authentication (Đã comment lại)
# Nếu muốn dùng cách này, bạn cần tải thư viện mssql-jdbc_auth-*.dll và bỏ vào C:\\Windows\\System32 hoặc trong thư mục bin của JDK.
# spring.datasource.url=jdbc:sqlserver://localhost;databaseName=SchoolManagementSystem;encrypt=false;trustServerCertificate=true;integratedSecurity=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA / HIBERNATE ─────────────────────────────────────────
# validate  = chỉ kiểm tra schema, không tạo/sửa bảng (dùng khi DB đã có sẵn)
# update    = tự cập nhật schema (dùng khi dev)
# none      = không làm gì (dùng khi production)
spring.jpa.hibernate.ddl-auto=update

# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect (auto-detected)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────────
# Secret key: chuỗi bất kỳ >= 32 ký tự, giữ bí mật
app.jwt.secret=gtuschool-super-secret-key-2024-change-in-production
# Thời gian hết hạn token: 86400000ms = 24 giờ
app.jwt.expiration-ms=86400000

# ── SECURITY ────────────────────────────────────────────────
# Tắt form login mặc định của Spring Security
# (Auth Module sẽ tự xử lý qua JWT)
spring.security.user.name=disable
spring.security.user.password=disable

# ── SESSION (NFR-11: auto logout sau 15 phút) ───────────────
server.servlet.session.timeout=15m

# ── MULTIPART (upload file nếu cần) ─────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── LOGGING ─────────────────────────────────────────────────
logging.level.com.example.nmcnpm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ── CUSTOM APP PROPERTIES ───────────────────────────────────
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=15
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:5500,http://localhost:5500,null
