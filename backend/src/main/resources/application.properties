# ============================
# Server Configuration
# ============================
server.port=8080

# ============================
# Database Configuration (NFR-25: tách biệt khỏi mã nguồn)
# SQL Server - SchoolManagementSystem
# ============================
spring.datasource.url=jdbc:sqlserver://DESKTOP-IFMSHB0;databaseName=SchoolManagementSystem;encrypt=false;trustServerCertificate=true;integratedSecurity=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================
# JPA / Hibernate Configuration
# ============================
# ddl-auto=none vi database da duoc tao san tu file SQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ============================
# Logging Configuration (NFR-08)
# ============================
logging.level.com.gtuschool=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================
# Jackson JSON Configuration
# ============================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false
