<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GtuSchool - Đăng nhập</title>
  <link rel="stylesheet" href="../CSS/login.css">
</head>

<body>

  <div class="login-container">

    <div class="login-left">
      <div class="brand">
        <div class="logo">G</div>
        <h1>GtuSchool</h1>
        <p>Hệ thống quản lý học sinh</p>
      </div>

      <h2>Chào mừng bạn quay lại 👋</h2>
      <p>Đăng nhập để quản lý học sinh, lớp học và hệ thống một cách hiệu quả.</p>
    </div>

    <div class="login-right">
      <div class="login-card">
        <h3>Đăng nhập</h3>

        <!-- Thông báo lỗi -->
        <div id="loginError"
          style="display:none; color:#e74c3c; background:#fdf0ef; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:14px;">
        </div>

        <!-- Thông báo thành công -->
        <div id="loginSuccess"
          style="display:none; color:#27ae60; background:#eafaf1; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:14px;">
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="txtEmail">Email</label>
            <input type="email" id="txtEmail" placeholder="Nhập email" required>
          </div>

          <div class="form-group">
            <label for="txtPassword">Mật khẩu</label>
            <input type="password" id="txtPassword" placeholder="Nhập mật khẩu" required>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">Đăng nhập</button>

          <div class="extra">
            <a href="#">Quên mật khẩu?</a>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    /**
     * Login.html – Kết nối frontend với backend API (FR-01).
     *
     * Luồng:
     *  1. User nhập email/username + password
     *  2. POST /auth/login → backend
     *  3. Nhận JWT token + redirectUrl
     *  4. Lưu token vào localStorage
     *  5. Redirect theo role
     */

    // Địa chỉ backend API
    const API_BASE = 'http://localhost:8080';

    const loginForm = document.getElementById('loginForm');
    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    const btnLogin = document.getElementById('btnLogin');

    loginForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      // Reset thông báo
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.textContent = 'Đang đăng nhập...';

      const email = document.getElementById('txtEmail').value.trim();
      const password = document.getElementById('txtPassword').value;

      if (!email || !password) {
        showError('Vui lòng nhập đầy đủ thông tin!');
        resetButton();
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Đăng nhập thành công
          const loginData = data.data;

          // Lưu thông tin vào localStorage
          localStorage.setItem('jwt_token', loginData.token);
          localStorage.setItem('user_id', loginData.userId);
          localStorage.setItem('username', loginData.username);
          localStorage.setItem('full_name', loginData.fullName);
          localStorage.setItem('user_role', loginData.role);

          showSuccess(`Đăng nhập thành công! Xin chào ${loginData.fullName} (${loginData.role})`);

          // Redirect sau 1 giây
          setTimeout(() => {
            // Map role → trang HTML tương ứng
            const rolePageMap = {
              'ADMIN': 'Home.html',
              'TEACHER': 'Home.html',
              'OFFICE_STAFF': 'Home.html',
              'PRINCIPAL': 'Home.html',
              'STUDENT': 'Home.html'
            };
            const targetPage = rolePageMap[loginData.role] || 'Home.html';
            window.location.href = targetPage;
          }, 1000);

        } else {
          // Đăng nhập thất bại
          showError(data.message || 'Sai tài khoản hoặc mật khẩu!');
        }

      } catch (err) {
        console.error('Login error:', err);
        showError('Không thể kết nối đến server! Vui lòng kiểm tra backend đang chạy tại ' + API_BASE);
      }

      resetButton();
    });

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
      successDiv.style.display = 'none';
    }

    function showSuccess(msg) {
      successDiv.textContent = msg;
      successDiv.style.display = 'block';
      errorDiv.style.display = 'none';
    }

    function resetButton() {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Đăng nhập';
    }
  </script>

</body>

</html>
